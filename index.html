<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Webbie</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Roboto", sans-serif;
      background-color: #0f1923;
      color: #f8f8f8;
      scroll-behavior: smooth;
    }

    /* Top Navigation Bar */
    .top-bar {
      background-color: #ff4655;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px 0;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .top-bar a {
      color: #fff;
      text-decoration: none;
      margin: 0 25px;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .top-bar a:hover {
      color: #0f1923;
      background-color: #fff;
      padding: 8px 14px;
      border-radius: 4px;
      transform: scale(1.1);
    }

    /* Video Container */
    .video-container {
      position: relative;
      width: 100%;
      height: 50vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-dark-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .video-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: "Orbitron", sans-serif;
      font-weight: 700;
      text-align: center;
      user-select: none;
      pointer-events: none;
      z-index: 2;
      text-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
    }

    .video-overlay h1 {
      font-size: 56px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .video-overlay p {
      font-family: "Roboto", sans-serif;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 1.5px;
      max-width: 400px;
      margin: 0 auto;
    }

    .video-overlay .register-link {
      font-family: "Roboto", sans-serif;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 1px;
      margin-top: 15px;
      pointer-events: auto; /* Allow clicking */
    }

    .video-overlay .register-link button {
      background: none;
      border: none;
      color: #fff;
      text-decoration: underline;
      font-size: inherit;
      font-family: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .video-overlay .register-link button:hover {
      color: #ff4655;
      text-decoration: none;
    }

    .sound-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #fff;
      background-color: rgba(0, 0, 0, 0.4);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
    }

    .sound-btn:hover {
      transform: scale(1.1);
      background-color: rgba(255, 70, 85, 0.8);
    }

    /* Centered Banner Image */
    .section-banner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 0;
      background-color: #0f1923;
    }

    .section-banner img {
      max-width: 80%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .section-banner img:hover {
      transform: scale(1.05);
    }

    /* Alternating Sections */
    .section-teaser {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 8%;
      background: #f1efe9;
      color: #0f1923;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .section-teaser:nth-child(even) {
      flex-direction: row-reverse;
    }

    .section-text {
      max-width: 500px;
      flex: 1 1 350px;
    }

    .section-text h2 {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      font-size: 48px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .section-text small {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 15px;
      display: inline-block;
      color: #5f5f5f;
    }

    .section-text p {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px;
      color: #333;
    }

    .section-text button {
      background-color: #ff4655;
      color: white;
      border: none;
      padding: 14px 30px;
      font-weight: 700;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      letter-spacing: 1px;
    }

    .section-text button:hover {
      background-color: #d93a44;
    }

    .section-image {
      flex: 1 1 500px;
      max-width: 600px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .section-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .section-image:hover {
      transform: scale(1.05);
    }

    @media (max-width: 850px) {
      .section-teaser {
        flex-direction: column !important;
        padding: 40px 6%;
      }
      .section-text h2 {
        font-size: 36px;
      }
      .section-text {
        max-width: 100%;
        text-align: center;
      }
      .section-image {
        max-width: 90vw;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-bar">
    <a href="index.html">Home</a>
    <a href="agent.html">Agents</a>
  </div>

  <!-- Video Container -->
  <div class="video-container">
    <video
      id="valorantVideo"
      src="cinevalovid.mp4"
      autoplay
      loop
      muted
      playsinline
    ></video>

    <div class="video-dark-overlay"></div>

    <div class="video-overlay">
      <h1>Project Webbie</h1>
      <p>A Project Website of Information and Communication and Technology Students!</p>
    </div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔈</button>
  </div>

  <!-- Centered Banner -->
  <section class="section-banner">
  </section>

  <!-- Alternating Sections -->
  <section class="section-teaser">
    <div class="section-text">
      <h2>Your Agents</h2>
      <small>CHOOSE YOUR HERO</small>
      <p>Explore all Magpili Agent, each with unique abilities to help secure victory.</p>
      <button onclick="location.href='agent.html'">VIEW ALL AGENTS</button>
    </div>
    <a href="agent.html" class="section-image">
      <img src="heros.webp" alt="Valorant Agents Preview" />
    </a>
  </section>

  <script>
  const video = document.getElementById("valorantVideo");
  const soundBtn = document.getElementById("soundBtn");

  function toggleSound() {
    video.muted = !video.muted;
    // Change emoji depending on mute state
    soundBtn.textContent = video.muted ? "🔈" : "🔊";
  }
</script>

</body>
</html>
